<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>驚喜刮刮樂 - 文山區公所最終版</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <style>
        /* 基礎設定：讓畫面佔滿全螢幕並禁止捲動 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; } [cite: 1, 2]
        .container { position: relative; width: 100vw; height: 100vh; } [cite: 3, 4]
        
        /* 底層：刮開後看到的驚喜文字與圖片 (z-index: 1) */
        .text-layer { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; background-color: #ffffff; } [cite: 4, 5]
        #msg { font-family: 'ZCOOL KuaiLe', cursive; font-size: 12vw; color: #ff4757; font-weight: bold; line-height: 1.3; text-align: center; margin-bottom: 20px; } [cite: 6, 7]
        .surprise-img { width: 180px; height: auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; margin-bottom: 30px; } [cite: 7, 8, 9]
        
        /* 視覺簽名：底部的單位標籤 */
        .signature { background: #003366; color: #ffffff; padding: 8px 20px; border-radius: 50px; font-size: 16px; font-weight: bold; font-family: sans-serif; margin-top: 20px; } [cite: 9, 10, 11]

        /* 畫布層：灰色的刮刮樂塗層 (z-index: 100) */
        canvas { position: absolute; top: 0; left: 0; z-index: 100; touch-action: none; cursor: crosshair; } [cite: 11, 12, 13]
        
        /* 提示層：教學小手動畫 (z-index: 200) */
        #hint-layer { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; pointer-events: none; transition: opacity 0.5s; } [cite: 13, 14, 15]
        .eraser-icon { font-size: 60px; animation: swipe 1.5s infinite ease-in-out; } [cite: 16, 17]
        .hint-text { color: white; font-size: 18px; margin-top: 15px; font-weight: bold; background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 25px; font-family: sans-serif; } [cite: 17, 18, 19]
        
        /* 小手左右滑動的動畫效果 */
        @keyframes swipe { 0% { transform: translateX(-50px) rotate(-15deg); } 50% { transform: translateX(50px) rotate(15deg); } 100% { transform: translateX(-50px) rotate(-15deg); } } [cite: 20, 21]
    </style>
</head>
<body>

<div class="container">
    <div class="text-layer">
        <span id="msg">載入中...</span>
        <img id="pic" class="surprise-img" src="" alt="Surprise">
        <div class="signature">🏛️ 文山區公所自製</div>
    </div>

    <div id="hint-layer">
        <div class="eraser-icon">🧼</div>
        <div class="hint-text">擦除螢幕看驚喜</div>
    </div>

    <canvas id="c"></canvas>
</div>

<script src="imageData.js"></script>

<script>
    /* ============================================================
       🚩 【 客 製 化 專 區 】
       這裡負責設定隨機出現的文字與對應的圖片變數
       ============================================================ */
    const data = [
        { text: "嘿！<br>發現你了", img: img1 }, // img1 對應 imageData.js 裡的變數
        { text: "公益揭弊者保護法", img: img2 },
        { text: "反詐騙暨消費者保護法宣導", img: img3 },
        { text: "維護廉潔你我有責", img: img4 },
        { text: "公務員赴大陸須申請許可", img: img5 }
    ]; [cite: 22, 23, 24, 25, 26]

    /* ============================================================
       ⚙️ 【 核心功能區 】- 負責刮刮樂邏輯，請勿輕易修改
       ============================================================ */
    const cvs = document.getElementById('c'), ctx = cvs.getContext('2d'); [cite: 27]
    const msg = document.getElementById('msg'), pic = document.getElementById('pic'), hint = document.getElementById('hint-layer'); [cite: 28]
    let drawing = false, firstTouch = true;

    // 1. 初始化：隨機挑選一組內容，並鋪上灰色塗層
    function init() {
        const item = data[Math.floor(Math.random() * data.length)]; // 隨機抽選 [cite: 29]
        msg.innerHTML = item.text; // 置入文字 [cite: 29]
        
        // 如果有圖片資料，就顯示圖片標籤並置入 Base64
        if(item.img && item.img !== "") { 
            pic.src = item.img; 
            pic.style.display = "block"; 
        } [cite: 30, 31]

        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#1e1e1e'; // 刮刮樂塗層的顏色
        ctx.fillRect(0, 0, cvs.width, cvs.height); [cite: 31, 32]
        
        // 設定「刮除」模式
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = 65; // 刮筆的粗細
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round'; [cite: 32]
    }

    // 2. 座標獲取：相容滑鼠與手機觸控 [cite: 34]
    function getPos(e) {
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: cx, y: cy };
    }

    // 3. 動作處理：開始刮、移動中、停止
    function start(e) {
        drawing = true;
        if (firstTouch) { hint.style.opacity = '0'; firstTouch = false; } // 第一次刮就隱藏教學提示 [cite: 36]
        ctx.beginPath();
        const p = getPos(e);
        ctx.moveTo(p.x, p.y);
    }

    function move(e) {
        if (!drawing) return;
        e.preventDefault(); // 防止手機畫面跳動 [cite: 38]
        const p = getPos(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke(); // 劃出透明線條
    }

    function stop() { drawing = false; } [cite: 38, 39]

    // 4. 事件監聽：連結滑鼠與觸控動作 [cite: 39]
    cvs.addEventListener('mousedown', start);
    cvs.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    cvs.addEventListener('touchstart', start, {passive: false});
    cvs.addEventListener('touchmove', move, {passive: false});
    cvs.addEventListener('touchend', stop);

    // 網頁載入後執行初始化 [cite: 40]
    window.onload = init;
</script>
</body>
</html>
