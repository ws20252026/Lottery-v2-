<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>驚喜刮刮樂 - 文山區公所最終版</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
        .container { position: relative; width: 100vw; height: 100vh; }
        
        /* 底層驚喜內容區 (z-index: 1) */
        .text-layer { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; background-color: #ffffff; }
        #msg { font-family: 'ZCOOL KuaiLe', cursive; font-size: 12vw; color: #ff4757; font-weight: bold; line-height: 1.3; text-align: center; margin-bottom: 20px; }
        .surprise-img { width: 180px; height: auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; margin-bottom: 30px; }
        
        /* 視覺標籤：刮開後才看得到 */
        .signature { background: #003366; color: #ffffff; padding: 8px 20px; border-radius: 50px; font-size: 16px; font-weight: bold; font-family: sans-serif; margin-top: 20px; }

        /* 畫布層 (z-index: 100) */
        canvas { position: absolute; top: 0; left: 0; z-index: 100; touch-action: none; cursor: crosshair; }
        
        /* 提示層 (z-index: 200) - 確保在最前方，不會被黑色遮蓋 */
        #hint-layer { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200; 
            pointer-events: none; transition: opacity 0.5s; 
        }
        .eraser-icon { font-size: 60px; animation: swipe 1.5s infinite ease-in-out; }
        .hint-text { 
            color: white; font-size: 18px; margin-top: 15px; font-weight: bold; 
            background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 25px;
            font-family: sans-serif;
        }
        
        @keyframes swipe { 0% { transform: translateX(-50px) rotate(-15deg); } 50% { transform: translateX(50px) rotate(15deg); } 100% { transform: translateX(-50px) rotate(-15deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="text-layer">
        <span id="msg">載入中...</span>
        <img id="pic" class="surprise-img" src="" alt="Surprise">
        <div class="signature">🏛️ 文山區公所自製</div>
    </div>

    <div id="hint-layer">
        <div class="eraser-icon">🧼</div>
        <div class="hint-text">擦除螢幕看驚喜</div>
    </div>

    <canvas id="c"></canvas>
</div>

<script>
    /**************************************************************
     * 🏆 專案簽名：文山區公所自製 (TAIPEI WENSHAN DISTRICT OFFICE)
     * 🛠️ 核心維護：2026-02-16 22:41
     **************************************************************/

    /* ============================================================
       🚩 【 1. 客 製 化 專 區 】 - 在這裡修改你想展示的文字與圖片
       ============================================================ */
    
    const data = [
        { 
            // 第 1 組內容
            text: "嘿！<br>發現你了", 
            img: "https://openclipart.org/download/218635/1432244243.svg" 
        },
        { 
            // 第 2 組內容
            text: "今天的你<br>超級閃耀", 
            img: "https://openclipart.org/download/298453/1525902340.svg" 
        }
        // 如需增加，請複製一組並確保中間有英文逗號
    ];

    /* ============================================================
       ⚙️ 【 2. 核 心 功 能 區 】 - 以下為程式運作邏輯，非必要請勿更動
       ============================================================ */

    const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
    const msg = document.getElementById('msg'), pic = document.getElementById('pic'), hint = document.getElementById('hint-layer');
    let drawing = false, firstTouch = true;

    function init() {
        const item = data[Math.floor(Math.random() * data.length)];
        msg.innerHTML = item.text; 
        if(item.img && item.img !== "") { pic.src = item.img; pic.style.display = "block"; }
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#1e1e1e'; 
        ctx.fillRect(0, 0, cvs.width, cvs.height);
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = 65;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }

    function getPos(e) {
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: cx, y: cy };
    }

    function start(e) {
        drawing = true;
        if (firstTouch) { 
            hint.style.opacity = '0'; 
            // 延遲一點點移除，讓淡出動畫更自然
            setTimeout(() => hint.style.display = 'none', 500); 
            firstTouch = false; 
        }
        ctx.beginPath();
        const p = getPos(e);
        ctx.moveTo(p.x, p.y);
    }

    function move(e) {
        if (!drawing) return;
        e.preventDefault();
        const p = getPos(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
    }

    function stop() { drawing = false; }
    cvs.addEventListener('mousedown', start);
    cvs.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    cvs.addEventListener('touchstart', start, {passive: false});
    cvs.addEventListener('touchmove', move, {passive: false});
    cvs.addEventListener('touchend', stop);
    window.onload = init;
</script>
</body>
</html>
