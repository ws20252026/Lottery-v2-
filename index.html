<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>驚喜刮刮樂 - 文山區公所政風室</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <style>
        /* 基礎設定：禁止滾動，確保滿版 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
        .container { position: relative; width: 100vw; height: 100vh; }
        
        /* 底層內容區：使用 Flex 佈局實現置中 */
        .text-layer { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; /* 垂直置中 */
            align-items: center;     /* 水平置中 */
            z-index: 1; 
            background-color: #ffffff; 
        }

        /* 📝 文字調整：調小字體並放在上方 */
        #msg { 
            font-family: 'ZCOOL KuaiLe', cursive; 
            font-size: 7vw;          /* 調小字體 (原為 12vw) */
            color: #ff4757; 
            font-weight: bold; 
            line-height: 1.2; 
            text-align: center; 
            margin-bottom: 10px;    /* 與下方圖片的間距 */
            order: 1;                /* 排序第一 */
        }

        /* 🖼️ 圖片調整：放大比例並向下移動 */
        .surprise-img { 
            width: 85vw;             /* 圖片寬度放大 */
            max-width: 500px;        /* 電腦版最大寬度 */
            height: auto; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            display: none; 
            margin-top: 30px;        /* 🚩 增加頂部間距，讓圖片下移 */
            order: 2;                /* 排序第二 */
        }
        
        /* 底部簽名標籤 */
        .signature { 
            background: #003366; 
            color: #ffffff; 
            padding: 8px 20px; 
            border-radius: 50px; 
            font-size: 14px; 
            font-weight: bold; 
            font-family: sans-serif; 
            margin-top: 30px; 
            order: 3;
        }

        /* 畫布層：刮刮樂塗層 */
        canvas { position: absolute; top: 0; left: 0; z-index: 100; touch-action: none; cursor: crosshair; }
        
        /* 教學提示層：高於畫布 */
        #hint-layer { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200; 
            pointer-events: none; transition: opacity 0.5s; 
        }
        .eraser-icon { font-size: 60px; animation: swipe 1.5s infinite ease-in-out; }
        .hint-text { 
            color: white; font-size: 18px; margin-top: 15px; font-weight: bold; 
            background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 25px;
            font-family: sans-serif;
        }
        
        @keyframes swipe { 0% { transform: translateX(-50px) rotate(-15deg); } 50% { transform: translateX(50px) rotate(15deg); } 100% { transform: translateX(-50px) rotate(-15deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="text-layer">
        <span id="msg">載入中...</span>
        <img id="pic" class="surprise-img" src="" alt="Surprise">
        <div class="signature">🏛️ 文山區公所政風室自製</div>
    </div>

    <div id="hint-layer">
        <div class="eraser-icon">🧼</div>
        <div class="hint-text">擦除螢幕看驚喜</div>
    </div>

    <canvas id="c"></canvas>
</div>

<script>
    /* ============================================================
       🚩 【 1. 客 製 化 專 區 】 - 這裡修改文字與圖片網址
       ============================================================ */
    const data = [
        { 
            text: "反貪宣導", 
            img: "https://raw.githubusercontent.com/ws20252026/Lottery-v2-/refs/heads/main/%E4%B8%8D%E7%95%B6%E9%80%81%E7%A6%AE%E6%88%96%E9%82%80%E5%AE%B4%20%E5%8F%8D%E8%80%8C%E6%98%AF%E5%8F%A6%E4%B8%80%E7%A8%AE%E5%82%B7%E5%AE%B3.jpg" 
        },
        { 
            text: "公務員赴陸宣導", 
            img: "https://raw.githubusercontent.com/ws20252026/Lottery-v2-/refs/heads/main/%E5%85%AC%E5%8B%99%E5%93%A1%E8%B5%B4%E9%99%B8%E6%8E%A1%E5%85%A8%E9%9D%A2%E8%A8%B1%E5%8F%AF%E5%88%B6.jpg" 
        },
        { 
            text: "公務機密宣導", 
            img: "https://raw.githubusercontent.com/ws20252026/Lottery-v2-/refs/heads/main/%E5%85%AC%E5%8B%99%E6%A9%9F%E5%AF%86.jpg"     
        },
        { 
            text: "公務機密宣導", 
            img: "https://raw.githubusercontent.com/ws20252026/Lottery-v2-/refs/heads/main/%E5%85%AC%E5%8B%99%E6%A9%9F%E5%AF%86.jpg" 
        },
         { 
            text: "公益揭弊者保護法宣導", 
            img: "https://raw.githubusercontent.com/ws20252026/Lottery-v2-/refs/heads/main/%E5%85%AC%E7%9B%8A%E6%8F%AD%E5%BC%8A%E8%80%85%E4%BF%9D%E8%AD%B7%E6%B3%95.png" 
        },
        { 
            text: "反詐騙／消費者保護法宣導", 
            img: "https://raw.githubusercontent.com/ws20252026/Lottery-v2-/refs/heads/main/%E5%88%A5%E7%95%B6%E4%BB%98%E9%8C%A2%E8%82%A5%E7%BE%8A.png" 
        },
    ];

    /* ============================================================
       ⚙️ 【 2. 核 心 功 能 區 】
       ============================================================ */
    const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
    const msg = document.getElementById('msg'), pic = document.getElementById('pic'), hint = document.getElementById('hint-layer');
    let drawing = false, firstTouch = true;

    function init() {
        const item = data[Math.floor(Math.random() * data.length)];
        msg.innerHTML = item.text; 
        
        // 圖片載入處理 
        if(item.img && item.img.trim() !== "") { 
            pic.src = item.img; 
            pic.style.display = "block"; 
        } else {
            pic.style.display = "none";
        }

        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        
        // 繪製灰色塗層 [cite: 32]
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#1e1e1e'; 
        ctx.fillRect(0, 0, cvs.width, cvs.height);
        
        // 設定刮除筆觸 [cite: 32]
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = 65;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }

    function getPos(e) {
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: cx, y: cy };
    }

    function start(e) {
        drawing = true;
        if (firstTouch) { 
            hint.style.opacity = '0'; 
            setTimeout(() => hint.style.display = 'none', 500);
            firstTouch = false; 
        }
        ctx.beginPath();
        const p = getPos(e);
        ctx.moveTo(p.x, p.y);
    }

    function move(e) {
        if (!drawing) return;
        e.preventDefault();
        const p = getPos(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
    }

    function stop() { drawing = false; }
    
    cvs.addEventListener('mousedown', start);
    cvs.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    cvs.addEventListener('touchstart', start, {passive: false});
    cvs.addEventListener('touchmove', move, {passive: false});
    cvs.addEventListener('touchend', stop);
    
    window.onload = init;
</script>
</body>
</html>
