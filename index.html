<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>驚喜刮刮樂 - 文山區公所最終版</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <style>
        /* 強制滿版，防止歪掉 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; } [cite: 1, 2]
        .container { position: relative; width: 100vw; height: 100vh; } [cite: 3, 4]
        
        /* 底層文字與圖片置中 */
        .text-layer { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; background-color: #ffffff; } [cite: 4, 5]
        #msg { font-family: 'ZCOOL KuaiLe', cursive; font-size: 10vw; color: #ff4757; font-weight: bold; line-height: 1.3; text-align: center; margin-bottom: 20px; } [cite: 6, 7]
        .surprise-img { width: 220px; height: auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; margin-bottom: 30px; } [cite: 7, 8, 9]
        
        .signature { background: #003366; color: #ffffff; padding: 8px 20px; border-radius: 50px; font-size: 16px; font-weight: bold; font-family: sans-serif; margin-top: 20px; } [cite: 9, 10, 11]

        /* 畫布層 */
        canvas { position: absolute; top: 0; left: 0; z-index: 100; touch-action: none; cursor: crosshair; } [cite: 11, 12, 13]
        
        /* 提示動畫層 */
        #hint-layer { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; pointer-events: none; transition: opacity 0.5s; } [cite: 13, 14, 15]
        .eraser-icon { font-size: 60px; animation: swipe 1.5s infinite ease-in-out; } [cite: 16, 17]
        .hint-text { color: white; font-size: 18px; margin-top: 15px; font-weight: bold; background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 25px; font-family: sans-serif; } [cite: 17, 18, 19]
        
        @keyframes swipe { 0% { transform: translateX(-50px) rotate(-15deg); } 50% { transform: translateX(50px) rotate(15deg); } 100% { transform: translateX(-50px) rotate(-15deg); } } [cite: 19, 20, 21]
    </style>
</head>
<body>

<div class="container">
    <div class="text-layer">
        <span id="msg">載入中...</span>
        <img id="pic" class="surprise-img" src="" alt="Surprise">
        <div class="signature">🏛️ 文山區公所自製</div>
    </div>

    <div id="hint-layer">
        <div class="eraser-icon">🧼</div>
        <div class="hint-text">擦除螢幕看驚喜</div>
    </div>

    <canvas id="c"></canvas>
</div>

<script src="imagedata.js"></script>

<script>
    /* ============================================================
       🚩 【 客 製 化 專 區 】
       ============================================================ */
    const data = [
        { text: "嘿！<br>發現你了", img: typeof img1 !== 'undefined' ? img1 : "" }, [cite: 22, 23]
        { text: "公益揭弊者保護法", img: typeof img2 !== 'undefined' ? img2 : "" }, [cite: 23]
        { text: "反詐騙暨消費者保護法宣導", img: typeof img3 !== 'undefined' ? img3 : "" }, [cite: 24]
        { text: "維護廉潔你我有責", img: typeof img4 !== 'undefined' ? img4 : "" }, [cite: 24, 25]
        { text: "公務員赴大陸須申請許可", img: typeof img5 !== 'undefined' ? img5 : "" } [cite: 25]
    ];

    /* ============================================================
       ⚙️ 【 核心功能區 】
       ============================================================ */
    const cvs = document.getElementById('c'), ctx = cvs.getContext('2d'); [cite: 27]
    const msg = document.getElementById('msg'), pic = document.getElementById('pic'), hint = document.getElementById('hint-layer'); [cite: 28]
    let drawing = false, firstTouch = true;

    function init() {
        // 隨機抽選內容
        const item = data[Math.floor(Math.random() * data.length)]; [cite: 29]
        msg.innerHTML = item.text; [cite: 29]
        
        // 檢查圖片是否存在
        if(item.img && item.img !== "") { 
            pic.src = item.img; 
            pic.style.display = "block"; 
        } [cite: 30, 31]

        // 設定畫布大小
        cvs.width = window.innerWidth; [cite: 31]
        cvs.height = window.innerHeight; [cite: 32]
        
        // 繪製灰色塗層
        ctx.globalCompositeOperation = 'source-over'; [cite: 31]
        ctx.fillStyle = '#b0b0b0'; // 換成灰色更有刮刮感
        ctx.fillRect(0, 0, cvs.width, cvs.height); [cite: 32]
        
        // 設定刮除模式
        ctx.globalCompositeOperation = 'destination-out'; [cite: 32]
        ctx.lineWidth = 60; [cite: 32]
        ctx.lineCap = 'round'; [cite: 32]
        ctx.lineJoin = 'round'; [cite: 32]
    }

    function getPos(e) {
        const cx = e.touches ? e.touches[0].clientX : e.clientX; [cite: 33, 34]
        const cy = e.touches ? e.touches[0].clientY : e.clientY; [cite: 34]
        return { x: cx, y: cy }; [cite: 34]
    }

    function start(e) {
        drawing = true; [cite: 35]
        if (firstTouch) { hint.style.opacity = '0'; firstTouch = false; } [cite: 36]
        ctx.beginPath(); [cite: 36]
        const p = getPos(e); [cite: 37]
        ctx.moveTo(p.x, p.y); [cite: 37]
    }

    function move(e) {
        if (!drawing) return; [cite: 37]
        e.preventDefault(); [cite: 38]
        const p = getPos(e); [cite: 38]
        ctx.lineTo(p.x, p.y); [cite: 38]
        ctx.stroke(); [cite: 38]
    }

    function stop() { drawing = false; } [cite: 38]

    cvs.addEventListener('mousedown', start); [cite: 39]
    cvs.addEventListener('mousemove', move); [cite: 39]
    window.addEventListener('mouseup', stop); [cite: 39]
    cvs.addEventListener('touchstart', start, {passive: false}); [cite: 39]
    cvs.addEventListener('touchmove', move, {passive: false}); [cite: 39]
    cvs.addEventListener('touchend', stop); [cite: 39]

    window.onload = init; [cite: 40]
</script>
</body>
</html>
