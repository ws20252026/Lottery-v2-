<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>驚喜刮刮樂 - 文山區公所政風室</title>

    <style>
        /* 【第一區：全域樣式】控制整個畫面的排版 */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; /* 禁止網頁滾動 */
            background: #fff; 
        }
        .container { position: relative; width: 100vw; height: 100vh; }
        
        /* 【第二區：底層驚喜內容】控制文字與圖片的位置 */
        .text-layer { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; 
            justify-content: center; /* 垂直居中 */
            align-items: center;     /* 水平居中 */
            z-index: 1; background-color: #ffffff; 
        }

        /* 📝 刮開後的文字樣式 */
        #msg { 
            font-family: "DFKai-SB", "標楷體", serif; /* 修改字體樣式 */
            font-size: 7vw;          /* 🚩 修改字體大小 (vw為比例) */
            color: #8c1f28;          /* 🚩 修改文字顏色 */
            font-weight: bold; 
            line-height: 1.2; text-align: center; 
            margin-bottom: 10px;     /* 文字與圖片的間距 */
            order: 1;                /* 確保文字顯示在最上方 */
        }

        /* 🖼️ 刮開後的圖片樣式 */
        .surprise-img { 
            width: 85vw;             /* 🚩 修改圖片寬度 */
            max-width: 500px;        /* 電腦版最大寬度 */
            height: auto; 
            border-radius: 15px;     /* 圖片圓角 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            display: none; 
            margin-top: 20px;        /* 🚩 修改圖片下移距離 */
            order: 2;
        }
        
        /* 🏛️ 底部簽名標籤 */
        .signature { 
            background: #003366;     /* 🚩 修改標籤顏色 */
            color: #ffffff; 
            padding: 8px 25px; 
            border-radius: 50px; 
            font-size: 14px; 
            font-weight: bold; 
            font-family: sans-serif; 
            margin-top: 25px;        /* 標籤與圖片的間距 */
            order: 3;
        }

        /* 【第三區：畫布層】這是覆蓋在上面的黑色塗層 */
        canvas { 
            position: absolute; top: 0; left: 0; 
            z-index: 100;            /* 層級需高於底層內容 */
            touch-action: none;      /* 防止手機刮開時網頁震動 */
            cursor: crosshair;       /* 滑鼠樣式變為十字架 */
        }
        
        /* 【第四區：提示層】刮除前的導引動畫 */
        #hint-layer { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 200;            /* 層級最高，確保導引圖示看得見 */
            pointer-events: none;    /* 讓觸碰動作能穿透此層直接點擊畫布 */
            transition: opacity 0.5s;/* 消失時的淡出動畫 */
        }
        .eraser-icon { font-size: 60px; animation: swipe 1.5s infinite ease-in-out; }
        .hint-text { 
            color: white; font-size: 18px; margin-top: 15px; font-weight: bold; 
            background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 25px;
        }
        /* 提示動畫左右擺動 */
        @keyframes swipe { 
            0% { transform: translateX(-50px) rotate(-15deg); } 
            50% { transform: translateX(50px) rotate(15deg); } 
            100% { transform: translateX(-50px) rotate(-15deg); } 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="text-layer">
        <span id="msg">載入中...</span>
        <img id="pic" class="surprise-img" src="" alt="圖片載入失敗">
        <div class="signature">🏛️ 文山區公所政風室</div>
    </div>

    <div id="hint-layer">
        <div class="eraser-icon">🧼</div>
        <div class="hint-text">擦除螢幕看驚喜，每次都不一樣呦</div>
    </div>

    <canvas id="c"></canvas>
</div>

<script>
    /* ============================================================
       🚩 【第五區：內容資料庫】 - 在這裡增加、刪除、或修改文字圖片
       ============================================================ */
    // ⚠️ 請確保圖片檔名大小寫與 GitHub 檔案列表完全一致！
    const data = [
        { text: "反貪宣導", img: "https://raw.githubusercontent.com/ws20252026/Lottery-v2-/main/%E5%8F%8D%E8%B2%AA%E5%AE%A3%E5%B0%8E.png" },
        { text: "公務員赴陸宣導", img: "https://raw.githubusercontent.com/ws20252026/Lottery-v2-/main/%E5%85%AC%E5%8B%99%E5%93%A1%E8%B5%B4%E9%99%B8%E6%8E%A1%E5%85%A8%E9%9D%A2%E8%A8%B1%E5%8F%AF%E5%88%B6.jpg" },
        { text: "公務機密宣導", img: "https://raw.githubusercontent.com/ws20252026/Lottery-v2-/main/%E5%85%AC%E5%8B%99%E6%A9%9F%E5%AF%86.jpg" },
        { text: "公益揭弊者保護法宣導", img: "https://raw.githubusercontent.com/ws20252026/Lottery-v2-/main/%E5%85%AC%E7%9B%8A%E6%8F%AD%E5%BC%8A%E8%80%85%E4%BF%9D%E8%AD%B7%E6%B3%95.png" },
        { text: "反詐騙宣導", img: "https://raw.githubusercontent.com/ws20252026/Lottery-v2-/main/%E5%88%A5%E7%95%B6%E4%BB%98%E9%8C%A2%E8%82%A5%E7%BE%8A.png" },
        { text: "廉政署透明晶質獎宣導", img: "https://raw.githubusercontent.com/ws20252026/Lottery-v2-/main/%E9%80%8F%E6%98%8E%E6%99%B6%E8%B3%AA%E7%8D%8E%E7%B0%A1%E4%BB%8B.jpg" },
        { text: "反賄選宣導", img: "https://raw.githubusercontent.com/ws20252026/Lottery-v2-/main/%E5%8F%8D%E8%B3%84%E9%81%B8.png" }
    ];

    /* ============================================================
       🚩 【第六區：互動邏輯】 - 控制刮刮樂的初始設定與筆刷
       ============================================================ */
    const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
    const msg = document.getElementById('msg'), pic = document.getElementById('pic'), hint = document.getElementById('hint-layer');
    let drawing = false, firstTouch = true;

    function init() {
        // 從資料庫隨機抽出一個項目
        const item = data[Math.floor(Math.random() * data.length)];
        msg.innerHTML = item.text; 
        if(item.img) { 
            pic.src = item.img; 
            pic.style.display = "block"; 
        }

        // 畫布寬高與螢幕同步
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        
        // 🏁 這裡是設定前幕底色的地方
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#1e1e1e'; // 🚩 這裡是黑色底，想要紅底改成 #d63031
        ctx.fillRect(0, 0, cvs.width, cvs.height);
        
        // 🖌️ 這裡是筆刷設定
        ctx.globalCompositeOperation = 'destination-out'; // 設定為「擦除模式」
        ctx.lineWidth = 120;      // 🚩 這裡是筆刷粗細，數字越大越好刮
        ctx.lineCap = 'round';   // 筆刷末端為圓形
        ctx.lineJoin = 'round';  // 筆刷轉折處為圓形
    }

    /* 獲取座標與處理觸碰事件的腳本... */
    function getPos(e) {
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: cx, y: cy };
    }

    function start(e) {
        drawing = true;
        if (firstTouch) { 
            hint.style.opacity = '0'; // 第一次刮的時候隱藏提示
            setTimeout(() => hint.style.display = 'none', 500);
            firstTouch = false; 
        }
        ctx.beginPath();
        const p = getPos(e);
        ctx.moveTo(p.x, p.y);
    }

    function move(e) {
        if (!drawing) return;
        e.preventDefault(); // 防止手機畫面跳動
        const p = getPos(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
    }

    function stop() { drawing = false; }
    
    // 監聽各種互動事件
    cvs.addEventListener('mousedown', start);
    cvs.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    cvs.addEventListener('touchstart', start, {passive: false});
    cvs.addEventListener('touchmove', move, {passive: false});
    cvs.addEventListener('touchend', stop);
    
    // 網頁啟動！
    window.onload = init;
</script>
</body>
</html>
